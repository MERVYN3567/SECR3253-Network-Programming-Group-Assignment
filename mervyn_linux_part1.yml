---
- name: MERVYN - LINUX TELEMETRY PART 1
  hosts: localhost
  connection: local
  gather_facts: true

  tasks:
    - name: GET CPU INFORMATION
      command: lscpu
      register: cpu_info

    - name: GET CURRENT DATE AND TIME
      command: date
      register: date_info

    - name: DISPLAY LINUX TELEMETRY PART 1
      debug:
        msg:
          - "Hostname: {{ ansible_hostname }}"
          - "Current Date/Time: {{ date_info.stdout }}"
          - "Memory Total (MB): {{ ansible_memtotal_mb }}"
          - "Memory Free (MB): {{ ansible_memfree_mb }}"
          - "CPU Info Snippet:"
          - "{{ cpu_info.stdout_lines[0:7] }}"
